recommendation_task:
  description: >
    The user has requested a product recommendation with the following query: {user_query}.

    1. Analyze the query to extract key parameters:
       - Skin Type (e.g., dry, oily, sensitive)
       - Concern/Goal (e.g., hydration, acne, anti-aging)
       - Product Type preference (if any)

    2. Use the RAG Query Tool to search for products. 
       Formulate precise queries using metadata like 'тип кожи', 'тип продукта'.

    3. Select the top 3-5 most relevant products.

    4. Present the recommendations in a structured, friendly format in Russian.

    ВАЖНО: Для каждой рекомендации ОБЯЗАТЕЛЬНО укажи артикул товара в формате `[article: 19000XXXXX]` сразу после названия.
    Пример вывода:
    🌟 Рекомендация 1: CLARINS Eau Micellaire [article: 19000279540]
    💧 Почему подходит: ...
  expected_output: >
    Список из 3-5 рекомендаций в указанном формате.
  agent: recommendation_agent