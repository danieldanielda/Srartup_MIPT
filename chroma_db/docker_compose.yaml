version: '3.9'
networks:
  net:
    driver: bridge

services:
  chromadb:
    image: chromadb/chroma:latest
    container_name: persist
    shm_size: '6gb'
    volumes:
      - ./chroma:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
    env_file:
      - .env
    ports:
      - "8000:8000" 
    networks:
      - net